services:
  pilot-study:
    build: .
    image: pilot-study:latest
    container_name: pilot-study
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # SQLite DB + WAL files. Everything else in the image is read-only.
      - ./data:/app/data
    environment:
      NODE_ENV: production
      # LLM provider selection. `openai` | `anthropic` | `google`. Leave unset
      # and the generate/chat features simply error with a clear message when
      # tapped; the offline flashcard flow does not require any of these.
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
    env_file:
      # Compose picks these up if present; missing file is ignored so first-run
      # without any secrets still works. Put your LLM keys here.
      - path: .env
        required: false
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
