services:
  pilot-study:
    build: .
    image: pilot-study:latest
    container_name: pilot-study
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # SQLite DB + WAL files. Everything else in the image is read-only.
      - ./data:/app/data
    environment:
      NODE_ENV: production
      # LLM starting provider. `anthropic` | `openai` | `google`. Unset = use
      # the built-in priority chain (Anthropic Opus 4.6 -> GPT-5.5 -> GPT-5.4
      # -> Gemini 3.1 Pro). Any provider whose API key is missing or whose
      # call fails is automatically skipped; offline flashcards work without
      # any of these set.
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_MODEL_FALLBACK: ${ANTHROPIC_MODEL_FALLBACK:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_MODEL_FALLBACK: ${OPENAI_MODEL_FALLBACK:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-}
      GOOGLE_MODEL_FALLBACK: ${GOOGLE_MODEL_FALLBACK:-}
    env_file:
      # Compose picks these up if present; missing file is ignored so first-run
      # without any secrets still works. Put your LLM keys here.
      - path: .env
        required: false
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
